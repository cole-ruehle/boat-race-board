<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beer Drinking Time | Official Leaderboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="uni-header">
    <div class="uni-header__inner">
      <div class="uni-brand">
        <span class="uni-brand__title">Beer Drinking Time</span>
      </div>
      <nav class="uni-nav" aria-label="Primary">
        <a href="#" class="uni-nav__link uni-nav__link--active">Leaderboard</a>
      </nav>
      <button type="button" class="btn-sync is-hidden" id="btnSyncSheet" title="Reload data from Google Sheet">
        Refresh sheet
      </button>
    </div>
  </header>

  <main class="board-main">
    <section class="title-block" aria-labelledby="page-title">
      <div class="title-block__poster">
        <div class="title-block__poster-placeholder" aria-hidden="true">
          <span class="title-block__poster-initials">BDT</span>
        </div>
      </div>
      <div class="title-block__meta">
        <h1 id="page-title" class="title-block__name">Beer Drinking Time</h1>
        <p class="title-block__tagline">Season leaderboard · informal study cohort</p>
        <div class="title-block__facts">
          <span class="fact"><strong>Format</strong> timed session</span>
          <span class="fact"><strong>Updated</strong> <time id="lastUpdated">—</time></span>
        </div>
      </div>
    </section>

    <p class="sheet-banner is-hidden" id="sheetBanner" role="status"></p>

    <section class="cast-section" aria-labelledby="cast-heading">
      <div class="section-heading">
        <h2 id="cast-heading" class="section-heading__title">Leaderboard</h2>
        <p class="section-heading__sub">Name · drink · portrait · time (from Google Sheet)</p>
      </div>
      <div class="drink-filter is-hidden" id="drinkFilter" role="group" aria-label="Filter by drink">
        <span class="drink-filter__label">Show</span>
        <button type="button" class="drink-filter__btn is-active" data-filter="all">All</button>
        <button type="button" class="drink-filter__btn" data-filter="water">Water</button>
        <button type="button" class="drink-filter__btn" data-filter="beer">Beer</button>
        <button type="button" class="drink-filter__btn" data-filter="other">Other</button>
      </div>
      <ul class="cast-list" id="castList"></ul>
      <p class="cast-empty" id="castEmpty" hidden>No rows yet.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Beer Drinking Time</p>
  </footer>

  <template id="castTierTemplate">
    <li class="cast-tier">
      <div class="cast-tier__inner">
        <span class="cast-tier__title"></span>
        <span class="cast-tier__sub"></span>
      </div>
    </li>
  </template>

  <template id="castRowTemplate">
    <li class="cast-card">
      <span class="cast-card__turn-badge" hidden>TURN</span>
      <div class="cast-card__photo-wrap">
        <img class="cast-card__photo" alt="" />
        <div class="cast-card__photo-fallback" aria-hidden="true"></div>
      </div>
      <div class="cast-card__body">
        <h3 class="cast-card__name"></h3>
        <div class="cast-card__drink-row">
          <span class="cast-card__stat-label">Drink</span>
          <span class="cast-card__drink-badge"></span>
        </div>
        <div class="cast-card__time-row">
          <span class="cast-card__time-label">Time</span>
          <span class="cast-card__time-value time-meter"></span>
        </div>
      </div>
    </li>
  </template>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
